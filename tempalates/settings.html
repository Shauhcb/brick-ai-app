<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - BRICK AI 👾</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 15px; }
        h1 { text-align: center; margin-bottom: 25px; color: #667eea; }
        .user-info { background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .user-info p { margin: 5px 0; }
        .setting-item { margin-bottom: 25px; padding: 20px; background: #f8f9ff; border-radius: 8px; }
        .setting-item h3 { margin-bottom: 10px; color: #333; }
        .theme-options { display: flex; gap: 15px; margin-top: 10px; }
        .theme-btn { flex: 1; padding: 15px; border: 2px solid #e0e0e0; background: white; border-radius: 10px; cursor: pointer; }
        .theme-btn.active { border-color: #667eea; background: #f8f9ff; }
        .theme-btn:hover { border-color: #667eea; }
        .logout-btn { display: block; width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 10px; text-align: center; text-decoration: none; margin-top: 20px; }
        .logout-btn:hover { background: #c0392b; }
        .back-link { color: #667eea; text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 15px 0; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 0.9em; }
        @media (max-width: 768px) {
            .theme-options { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-link">← Back to Chats</a>
        <h1>⚙️ Settings</h1>
        
        <div class="user-info">
            <p><strong>👤 Username:</strong> {{ session.get('username') }}</p>
            <p><strong>📧 Email:</strong> {{ session.get('user_email') }}</p>
        </div>

        <div class="setting-item">
            <h3>📊 Your Activity</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">{{ search_count }}</div>
                    <div class="stat-label">Searches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">{{ chat_count }}</div>
                    <div class="stat-label">Chat Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">{{ feedback_count }}</div>
                    <div class="stat-label">Feedback Sent</div>
                </div>
            </div>
        </div>

        <div class="setting-item">
            <h3>🎨 App Theme</h3>
            <div class="theme-options">
                <button class="theme-btn {% if session.get('theme') != 'dark' %}active{% endif %}" onclick="setTheme('light')">☀️ Light</button>
                <button class="theme-btn {% if session.get('theme') == 'dark' %}active{% endif %}" onclick="setTheme('dark')">🌙 Dark</button>
            </div>
        </div>

        <div class="setting-item">
            <h3>💬 Feedback</h3>
            <textarea id="feedbackInput" placeholder="Share your feedback..." style="width:100%; padding:10px; border:2px solid #e0e0e0; border-radius:8px; min-height:80px; margin-bottom:10px;"></textarea>
            <button onclick="submitFeedback()" style="padding:10px 20px; background:#667eea; color:white; border:none; border-radius:8px; cursor:pointer;">Submit Feedback</button>
        </div>

        <a href="/logout" class="logout-btn">🚪 Logout</a>
    </div>
    <script>
        function setTheme(theme) {
            fetch('/set-theme', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({theme: theme}) 
            })
            .then(() => location.reload());
        }

        function submitFeedback() {
            const message = document.getElementById('feedbackInput').value.trim();
            if (!message) {
                alert('Please enter your feedback.');
                return;
            }
            fetch('/submit-feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('Thank you for your feedback! 🙏');
                    document.getElementById('feedbackInput').value = '';
                } else {
                    alert('Error submitting feedback. Please try again.');
                }
            });
        }
    </script>
</body>
</html>
