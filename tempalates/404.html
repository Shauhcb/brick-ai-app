<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; padding: 60px; border-radius: 20px; text-align: center; max-width: 500px; }
        h1 { font-size: 72px; margin: 0; color: #667eea; }
        h2 { color: #333; margin: 20px 0; }
        p { color: #666; margin-bottom: 30px; }
        .btn { padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; display: inline-block; }
        .btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
