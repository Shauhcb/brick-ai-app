<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICK AI 👾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        .header { background: #667eea; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: white; }
        .btn-icon { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; text-decoration: none; }
        .main-content { display: flex; flex: 1; }
        .sidebar { width: 280px; background: #f8f9ff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #e0e0e0; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; background: white; border: 1px solid #e8eaff; }
        .chat-item.active { background: #667eea; color: white; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; background: #f8f9ff; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9ff; }
        .chat-message { margin-bottom: 15px; padding: 12px 16px; border-radius: 12px; max-width: 75%; }
        .chat-message.user { background: #667eea; color: white; margin-left: auto; }
        .chat-message.ai { background: white; color: #333; margin-right: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .chat-input-area { padding: 15px; background: #f8f9ff; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 25px; }
        .chat-send-btn { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👾 BRICK AI</h1>
            <div>
                <a href="/search" class="btn-icon">🔍 Search</a>
                <a href="/settings" class="btn-icon">⚙️ Settings</a>
            </div>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-header"><h3>💬 Chats</h3></div>
                <div class="chat-list">
                    <div class="chat-item active" onclick="loadChat('main', event)">
                        <h4>BRICK AI Assistant</h4>
                        <p>Your AI companion</p>
                    </div>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header"><h3>💬 BRICK AI Assistant</h3></div>
                <div class="chat-messages" id="chatMessages">
                    <p style="text-align:center; color:#999;">Start a conversation!</p>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type your message...">
                    <button class="chat-send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m];
            });
        }

        function loadChatHistory() {
            fetch('/get-chat-history').then(r => r.json()).then(data => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => {
                        addMessage('user', msg.message);
                        addMessage('ai', msg.response);
                    });
                }
            });
        }

        function loadChat(chatId, event) {
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.chat-item').classList.add('active');
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            addMessage('user', message);
            input.value = '';
            fetch('/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({message: message}) 
            })
            .then(r => r.json()).then(data => {
                if (data.response) addMessage('ai', data.response);
                if (data.error) alert(data.error);
            });
        }

        function addMessage(type, text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message ' + type;
            let safeText = escapeHTML(text).replace(/\n/g, '<br>');
            div.innerHTML = (type === 'ai' ? '<strong>👾 BRICK AI</strong><p>' : '<p>') + safeText + '</p>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        window.onload = loadChatHistory;
    </script>
</body>
</html>
